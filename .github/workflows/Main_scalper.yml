name: 5m F&O Sniper Scalper Engine

on:
  schedule:
    # Runs every 5 mins during NSE market hours (IST 9:15 - 15:30)
    # 03:45 UTC to 10:00 UTC covers the full Indian session
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  sniper_scalp:
    runs-on: ubuntu-latest
    # Prevents multiple runs from overlapping if one run takes > 5 mins
    concurrency:
      group: sniper-scalp-group
      cancel-in-progress: false

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetches full history so git push works reliably
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent runs

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests numpy

      - name: 🚀 Run Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scalper_bot_fno.py

      - name: 📂 Sync Trade Data
        if: always() # Ensures data is saved even if the script hits an error
        run: |
          git config --global user.name "SniperBot"
          git config --global user.email "sniper@trading.com"
          # Only add files related to the scalper
          git add alert_status_scalp.json active_positions_scalp.json scalp_trade_summary.csv || true
          # Only commit if there are actually changes to the data
          if git diff --staged --quiet; then
            echo "No changes in trade data."
          else
            git commit -m "Sync Sniper Positions & Logs [skip ci]"
            git push origin main
          fi
