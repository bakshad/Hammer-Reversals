name: 5m F&O Sniper Scalper Engine

on:
  schedule:
    # Runs every 5 mins during NSE market hours (IST 9:15 - 15:30)
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch: 

jobs:
  sniper_scalp:
    runs-on: ubuntu-latest
    
    # CRITICAL: Grant permission to push JSON/CSV updates back to the repo
    permissions:
      contents: write 

    concurrency:
      group: sniper-scalp-group
      cancel-in-progress: false

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests numpy

      - name: 🚀 Run Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scalper_bot_fno.py

      - name: 📂 Sync Trade Data
        if: always() 
        run: |
          git config --global user.name "SniperBot"
          git config --global user.email "sniper@trading.com"
          
          # Create files if missing to prevent "pathspec" errors
          touch alert_status_scalp.json active_positions_scalp.json scalp_trade_summary.csv
          
          # Pull latest data to avoid "rejected push" errors
          git pull --rebase origin main
          
          git add alert_status_scalp.json active_positions_scalp.json scalp_trade_summary.csv || true
          
          if git diff --staged --quiet; then
            echo "No changes in trade data."
          else
            git commit -m "Sync Sniper Positions & Logs [skip ci]"
            git push origin main
          fi
