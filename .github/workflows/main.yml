name: Professional FNO Reversal Scanner

on:
  schedule:
    # 9:15 AM IST (03:45 UTC) - Opening Scan
    - cron: '45 3 * * 1-5'
    # 9:30 AM to 3:15 PM IST (04:00 - 09:45 UTC) - Every 15 mins
    - cron: '0,15,30,45 4-9 * * 1-5'
    # 3:30 PM IST (10:00 UTC) - Final Market Close Scan
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  trade-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Allows the bot to save 'Locked-On' stocks
    
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run Scanner
        run: python reversal_bot_fno.py

      - name: Sync Memory and Trade Logs
        run: |
          git config --global user.name "ReversalBot-Action"
          git config --global user.email "actions@github.com"
          # Sync both the JSON memory and the CSV summary
          git add alert_memory_fno_15m.json weekly_trade_summary.csv
          git commit -m "Sync memory and logs [skip ci]" || exit 0
          git push
