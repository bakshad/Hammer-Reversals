name: F&O Final Entry Engine

on:
  schedule:
    # 1. Premarket Radar at 9:10 AM IST (03:40 UTC)
    - cron: '40 3 * * 1-5'
    # 2. Market Open Run at 9:15 AM IST (03:45 UTC)
    - cron: '45 3 * * 1-5'
    # 3. Regular Intervals from 9:30 AM to 3:30 PM IST (04:00 - 10:00 UTC)
    - cron: '*/15 4-10 * * 1-5'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for pushing data back to your repo
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance pandas requests numpy

      - name: 🚀 Run Reversal & Position Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py # Ensure your filename matches

      # --- STEP 3: SYNC DATA (The most important part for Position Management) ---
      - name: 📂 Sync Memory & Active Positions
        if: always() # Ensures logs are saved even if the bot crashes
        run: |
          git config --global user.name "TradingBot"
          git config --global user.email "bot@trading.com"
          
          # Add all data files
          git add alert_status.json active_positions.json ml_training_data.csv weekly_trade_summary.csv || true
          
          git commit -m "Sync: Open Positions & ML Logs [skip ci]" || echo "No changes"
          git push || echo "Sync failed"
