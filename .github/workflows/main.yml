name: 1H-15m Hybrid Sniper Engine

on:
  schedule:
    # Runs every 5 minutes from 9:10 AM to 3:35 PM IST
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch: 

jobs:
  sniper_reversal:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance pandas requests numpy pytz

      - name: Run Hybrid Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py

      - name: Sync Trade Data
        if: always() 
        run: |
          git config --global user.name "SniperBot"
          git config --global user.email "sniper@trading.com"
          git add alert_status_reversal.json active_positions_reversal.json
          git commit -m "Sync Active Positions [skip ci]" || echo "No changes"
          git push origin main || echo "No changes to push"
