name: 1H FNO Reversal Scanner

on:
  schedule:
    # Runs at the 5th minute of every hour from 4 AM to 10 AM UTC
    # Aligns with 9:35 AM to 3:35 PM IST
    - cron: '5 4-10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # Opting into Node.js 24 globally for this job
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Upgraded from v3

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded from v4
        with:
          python-version: '3.11' # Moving to a newer stable Python

      - name: Install Dependencies
        run: pip install yfinance pandas requests

      - name: Run Screener
        run: python reversal_bot_fno.py

      - name: Commit and Push Memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add alert_memory_fno_1h.json
          # Using || exit 0 to prevent the workflow from failing if there are no new alerts to commit
          git commit -m "Update alert memory [skip ci]" || exit 0
          git push
