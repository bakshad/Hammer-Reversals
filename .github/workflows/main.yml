name: 15-Minute FNO Reversal Scanner

on:
  schedule:
    # 03:45 UTC (09:15 IST)
    - cron: '45 3 * * 1-5'
    # Every 15 mins from 04:00 to 09:45 UTC (09:30 to 15:15 IST)
    - cron: '0,15,30,45 4-9 * * 1-5'
    # 10:00 UTC (15:30 IST) - The Final Scan
    - cron: '0 10 * * 1-5'
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance pandas requests

      - name: Run Screener
        run: python reversal_bot_fno.py

      - name: Commit and Push Memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add alert_memory_fno_15m.json
          git commit -m "Update alert memory [skip ci]" || exit 0
          git push
