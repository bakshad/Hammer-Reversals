name: 1H FNO Reversal Scanner

on:
  schedule:
    - cron: '5 4-10 * * 1-5' # 9:35 AM to 3:35 PM IST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for committing memory file
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install yfinance pandas requests

      - name: Run Screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py

      - name: Commit and Push Memory
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add alert_memory_fno_1h.json
          git commit -m "Update alert memory [skip ci]" || exit 0
          git push
