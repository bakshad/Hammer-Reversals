name: Dual-Timeframe F&O Engine

on:
  schedule:
    # 2026 Feature: Native IST Scheduling
    # 9:15 AM to 3:30 PM IST, Monday to Friday
    - cron: '15,30,45 9 * * 1-5'
      timezone: "Asia/Kolkata"
    - cron: '*/15 10-14 * * 1-5'
      timezone: "Asia/Kolkata"
    - cron: '0,15,30 15 * * 1-5'
      timezone: "Asia/Kolkata"
  workflow_dispatch: # Allows you to manually click "Run workflow"

jobs:
  trade:
    runs-on: ubuntu-latest
    
    # CRITICAL: Allows the bot to push CSV/JSON files back to your repo
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up runs using your requirements.txt

      - name: 📦 Install Dependencies
        run: pip install yfinance pandas requests numpy

      - name: 🚀 Run Reversal Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py

      - name: 📂 Sync Position Data & Logs
        if: always() # Ensures sync happens even if the bot hits an API timeout
        run: |
          git config --global user.name "TradingBot"
          git config --global user.email "bot@trading.com"
          
          # Force add all tracking files (bypasses any potential .gitignore conflicts)
          git add -f alert_status.json active_positions.json weekly_trade_summary.csv open_positions_snapshot.csv || true
          
          # Commit with an IST timestamp so GitHub always detects a distinct change
          export TZ="Asia/Kolkata"
          git commit -m "Sync Market Data: $(date +'%Y-%m-%d %H:%M') IST [skip ci]" || echo "No changes to sync"
          
          # Push back to the main repository
          git push

      - name: 📧 Send Weekly Summary (Fridays at Close)
        # This step only activates during the 3:00 PM - 3:30 PM cron block, or on manual trigger
        if: github.event.schedule == '0,15,30 15 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }} # Must be a 16-character App Password
        run: |
          export TZ="Asia/Kolkata"
          DAY_OF_WEEK=$(date +%u) # 5 equals Friday
          
          # Run the email script if it's Friday OR if you clicked "Run workflow" manually
          if [ "$DAY_OF_WEEK" -eq 5 ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            
            # Check if either CSV has data before trying to send the email
            if [ -s "weekly_trade_summary.csv" ] || [ -s "open_positions_snapshot.csv" ]; then
              echo "Data found. Sending Weekly Report..."
              python send_weekly_report.py
            else
              echo "⚠️ Both CSVs are empty or missing. Skipping email."
            fi
            
          else
            echo "Today is not Friday. Skipping weekly email."
          fi
