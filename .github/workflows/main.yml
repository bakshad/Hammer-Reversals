name: Elite Reversal Intelligence

on:
  schedule:
    # Runs every 15 mins during IST market hours
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  scan-and-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Dependencies
        run: pip install yfinance pandas requests numpy
      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py
      - name: Save Memory
        run: |
          git config --global user.name "EliteBot"
          git config --global user.email "bot@trading.com"
          git add alert_memory_fno_mtf.json || true
          git commit -m "Sync Memory" || echo "No changes"
          git push || echo "Retry later"
