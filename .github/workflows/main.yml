name: 15-Minute FNO Reversal Scanner

on:
  schedule:
    # Runs every 15 minutes from 3:45 AM UTC to 10:00 AM UTC (9:15 AM to 3:30 PM IST)
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance pandas requests

      - name: Run Screener
        run: python reversal_bot_fno.py

      - name: Commit and Push Memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add alert_memory_fno_15m.json
          git commit -m "Update alert memory [skip ci]" || exit 0
          git push
