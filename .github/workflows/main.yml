name: 15m MTF F&O Sniper Engine

on:
  schedule:
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch: 

jobs:
  sniper_scalp:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    concurrency:
      group: sniper-scalp-group
      cancel-in-progress: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests numpy nsepython

      - name: Run MTF Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scalper_bot_fno.py

      - name: Sync Trade Data
        if: always() 
        run: |
          git config --global user.name "SniperBot"
          git config --global user.email "sniper@trading.com"
          
          touch alert_status_scalp.json active_positions_scalp.json scalp_trade_summary.csv
          
          git add alert_status_scalp.json active_positions_scalp.json scalp_trade_summary.csv || true
          
          if git diff --staged --quiet; then
            echo "No changes in trade data. Skipping push."
          else
            git commit -m "Sync MTF Sniper Data [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
