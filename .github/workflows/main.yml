name: Hybrid FNO Scanner

on:
  schedule:
    # 9:15 AM to 3:30 PM IST (Mon-Fri)
    - cron: '45 3 * * 1-5'
    - cron: '0,15,30,45 4-9 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  run-hybrid:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests numpy

      - name: Run Hybrid Scanner
        run: python reversal_bot_fno.py

      - name: Commit Memory and ML Logs
        run: |
          git config --global user.name "HybridBot-Action"
          git config --global user.email "bot@trading.com"
          git add alert_memory_fno_15m.json weekly_trade_summary.csv ml_training_data.csv
          git commit -m "Sync Memory/ML Data [skip ci]" || exit 0
          git push
