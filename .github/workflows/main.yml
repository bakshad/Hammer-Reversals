name: 1H FNO Reversal Scanner

on:
  schedule:
    - cron: '5 4-10 * * 1-5' # 9:35 AM to 3:35 PM IST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      # This forces the runner to use Node 24 and helps clear the deprecation nagging
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5 # Upgraded to v5 for Node 24 support

      - name: Set up Python
        uses: actions/setup-python@v6 # Upgraded to v6 for Node 24 support
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance pandas requests

      - name: Run Screener
        run: python reversal_bot_fno.py

      - name: Commit and Push Memory
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add alert_memory_fno_1h.json
          git commit -m "Update alert memory [skip ci]" || exit 0
          git push
