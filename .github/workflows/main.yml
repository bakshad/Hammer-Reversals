name: Dual-Timeframe F&O Engine

on:
  schedule:
    # Runs every 15 minutes during NSE market hours (IST 9:15 - 15:30)
    # UTC: 3:45 to 10:00
    - cron: '45 3 * * 1-5'
    - cron: '*/15 4-9 * * 1-5'
    - cron: '0,15,30 10 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance pandas requests numpy

      - name: 🚀 Run Reversal Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py

      - name: 📂 Sync Position Data
        if: always()
        run: |
          git config --global user.name "TradingBot"
          git config --global user.email "bot@trading.com"
          git add alert_status.json active_positions.json weekly_trade_summary.csv || true
          git commit -m "Sync Positions & Logs [skip ci]" || echo "No changes"
          git push || echo "Sync failed"
