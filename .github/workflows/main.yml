name: Elite F&O Intelligence System

on:
  schedule:
    # 1. Premarket Radar: 03:40 UTC is 09:10 AM IST
    - cron: '40 3 * * 1-5'
    # 2. Main Scanner: Every 15 mins from 03:45 UTC (9:15 AM) to 10:00 UTC (3:30 PM)
    - cron: '*/15 4-10 * * 1-5'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  trading-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance pandas requests numpy

      # --- STEP 1: RUN PREMARKET RADAR (Only at 9:10 AM IST) ---
      - name: 🌅 Run Premarket Radar
        if: github.event.schedule == '40 3 * * 1-5'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python premarket_engine.py

      # --- STEP 2: RUN MAIN SCANNER (Every 15 mins) ---
      - name: 🚀 Run Main Hybrid Scanner
        if: github.event.schedule != '40 3 * * 1-5'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py

      # --- STEP 3: SYNC MEMORY & ML DATA ---
      - name: 📂 Sync Data to Repo
        run: |
          git config --global user.name "EliteBot-Engine"
          git config --global user.email "bot@trading.com"
          git add alert_memory_fno_mtf.json ml_training_data.csv || true
          git commit -m "Sync Memory & ML Logs [skip ci]" || echo "No changes"
          git push || echo "Sync failed, retrying next run"
