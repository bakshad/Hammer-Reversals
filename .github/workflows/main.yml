name: 🚀 F&O Hourly Execution Engine

on:
  schedule:
    # Runs at 16 mins past the hour (IST to UTC conversion)
    # 10:16 AM IST -> 04:46 UTC
    # 11:16 AM IST -> 05:46 UTC
    # 12:16 PM IST -> 06:46 UTC
    # 01:16 PM IST -> 07:46 UTC
    # 02:16 PM IST -> 08:46 UTC
    # 03:16 PM IST -> 09:46 UTC
    - cron: '46 4,5,6,7,8,9 * * 1-5'
  workflow_dispatch:

jobs:
  scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Dependencies
        run: pip install yfinance pandas requests numpy
      - name: Run Hourly Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py
      - name: Sync Memory
        run: |
          git config --global user.name "TradeBot"
          git config --global user.email "bot@trading.com"
          git add alert_memory_fno_mtf.json ml_training_data.csv || true
          git commit -m "Sync Hourly Data [skip ci]" || echo "No changes"
          git push || echo "Sync failed"
