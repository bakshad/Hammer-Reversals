name: Dual-Timeframe F&O Engine

on:
  schedule:
    # 2026 NEW FEATURE: Native IST Scheduling
    # 9:15 AM to 3:30 PM IST, Monday to Friday
    - cron: '15,30,45 9 * * 1-5'
      timezone: "Asia/Kolkata"
    - cron: '*/15 10-14 * * 1-5'
      timezone: "Asia/Kolkata"
    - cron: '0,15,30 15 * * 1-5'
      timezone: "Asia/Kolkata"
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  trade:
    runs-on: ubuntu-latest
    # CRITICAL: Permissions for pushing back position/alert logs
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up execution by caching libraries

      - name: 📦 Install Dependencies
        run: |
          pip install yfinance pandas requests numpy

      - name: 🚀 Run Reversal Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reversal_bot_fno.py

      - name: 📂 Sync Position Data & Logs
        if: always() # Run even if the bot encounters a calculation error
        run: |
          git config --global user.name "TradingBot-GitHubAction"
          git config --global user.email "bot@trading.com"
          
          # Add all potential tracking files
          git add alert_status.json active_positions.json weekly_trade_summary.csv || true
          
          # Commit only if changes exist to avoid workflow errors
          if git diff --cached --quiet; then
            echo "No changes in trade logs."
          else
            git commit -m "Sync: $(date +'%Y-%m-%d %H:%M') IST [skip ci]"
            git push
          fi
