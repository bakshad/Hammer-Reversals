name: NSE Trend Rider Bot

on:
  schedule:
    # Runs every 15 minutes from 9:15 AM to 3:30 PM IST (Monday-Friday)
    # 03:45 to 10:00 UTC = 09:15 to 15:30 IST
    - cron: '45 3 * * 1-5'
    - cron: '*/15 4-9 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to memory file

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Run Trend Rider Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push Memory Update
        run: |
          git config --global user.name "Gemini-Trading-Bot"
          git config --global user.email "bot@gemini.ai"
          # Add memory file and trade logs
          git add alert_status.json weekly_trade_summary.csv || true
          git commit -m "Update trade memory & logs [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
