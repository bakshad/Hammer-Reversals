name: Hybrid FNO Intelligence

on:
  schedule:
    # Runs during Indian Market Hours (9:15 AM - 3:30 PM IST)
    - cron: '45 3 * * 1-5'
    - cron: '0,15,30,45 4-9 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  trade-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests numpy

      - name: Run Scanner
        run: python reversal_bot_fno.py

      - name: Sync Data and Logs
        run: |
          git config --global user.name "HybridBot-Action"
          git config --global user.email "bot@trading.com"
          
          # Force sync files - skip error if files haven't changed
          git add alert_memory_fno_15m.json weekly_trade_summary.csv ml_training_data.csv || true
          git commit -m "Sync Memory and Logs [skip ci]" || echo "Nothing to commit"
          git push || echo "Push failed, will retry next run"
