Name: 9:10 AM Premarket Radar

on:
  schedule:
    # Runs at 3:40 AM UTC which is 9:10 AM IST
    - cron: '40 3 * * 1-5'
  workflow_dispatch:

jobs:
  premarket-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added nsepython and beautifulsoup4 for more reliable scraping
          pip install yfinance pandas requests nsepython beautifulsoup4

      - name: Run Premarket Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python premarket_engine.py
