name: 9:10 AM Premarket Radar

on:
  schedule:
    - cron: '40 3 * * 1-5' # 9:10 AM IST
  workflow_dispatch:

jobs:
  premarket-report:
    runs-on: ubuntu-latest
    steps:
               - name: Run Premarket Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # This ensures the bot finds the file regardless of the folder nesting
        run: |
          cd $GITHUB_WORKSPACE
          python premarket_engine.py

 
