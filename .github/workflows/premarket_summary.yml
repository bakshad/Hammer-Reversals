name: 9:10 AM Premarket Radar

on:
  schedule:
    # Line 9 starts below: Ensure there is exactly 1 space after the dash and quotes around the cron
    - cron: '40 3 * * 1-5'
  workflow_dispatch:

jobs:
  premarket-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance pandas requests

      - name: Run Premarket Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python premarket_engine.py
