name: 9:10 AM Premarket Radar

on:
  schedule:
    - cron: '40 3 * * 1-5' # 9:10 AM IST
  workflow_dispatch:

jobs:
  premarket-report:
    runs-on: ubuntu-latest
    steps:
      # STEP 1: This "downloads" your code onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # STEP 3: Install necessary libraries (yfinance, etc.)
      - name: Install Dependencies
        run: pip install yfinance pandas requests

      # STEP 4: Run your script
      - name: Run Premarket Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python premarket_engine.py
